<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Trashteroid</title>
  <link rel="stylesheet" href="/src/styles.css" />
</head>
<body data-screen="intro">
  <div id="hud" class="hidden">
    <div class="hud-chip hud-chip-score">
      <div id="hud-score">SCORE: 0</div>
    </div>
    <div class="hud-chip hud-chip-level">
      <div id="hud-level">LEVEL 1 - 15,000 mi</div>
    </div>
    <div class="hud-chip hud-chip-lives">
      <div id="hud-lives">LIVES: &#9829;&#9829;&#9829;</div>
    </div>
  </div>

  <div id="fps-counter" class="hidden">FPS: --</div>

  <div id="boss-indicator" class="hidden">
    <div id="boss-indicator-arrow">&#9650;</div>
    <div id="boss-indicator-dist">0 mi</div>
  </div>

  <div id="overlay">
    <div class="overlay-backdrop"></div>
    <div class="overlay-panel">
      <div class="overlay-kicker">Arcade Flight Briefing</div>
      <h1>TRASHTEROID</h1>
      <p class="subtitle">Plot the route, burn through the debris lanes, and keep Earth intact one run at a time.</p>
      <div class="overlay-actions">
        <button id="start-btn">START MISSION</button>
      </div>
    </div>
  </div>

  <div id="boss-bar-container" class="hidden">
    <div id="boss-bar-label">TRASHTEROID</div>
    <div id="boss-bar-track"><div id="boss-bar-fill"></div></div>
  </div>

  <div id="boost-bar-container" class="hidden">
    <div id="boost-bar-label">RECHARGE</div>
    <div id="boost-bar-track"><div id="boost-bar-fill"></div></div>
  </div>

  <div id="crosshair" class="hidden">
    <div class="crosshair-ring"></div>
    <div class="crosshair-line crosshair-left"></div>
    <div class="crosshair-line crosshair-right"></div>
    <div class="crosshair-line crosshair-bottom"></div>
    <div class="crosshair-dot"></div>
  </div>

  <div id="level-popup" class="hidden">
    <div id="level-popup-label">LEVEL 1</div>
    <div id="level-popup-sub">15,000 mi - Debris Field</div>
    <div id="level-popup-buttons">
      <button id="level-popup-yes">START LEVEL</button>
      <button id="level-popup-no">BACK</button>
    </div>
  </div>

  <div id="minimap" class="hidden">
    <canvas id="minimap-canvas" width="150" height="150"></canvas>
  </div>

  <canvas id="game-canvas"></canvas>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
